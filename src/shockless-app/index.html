<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shockless Engine</title>
    <style>
      html, body, #root { width: 100%; height: 100%; margin: 0; background: #090a0d; }
      .initial-boot-splash {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        color: #fff;
        background: linear-gradient(135deg, #1b1b1b 0%, #0a0a0a 55%, #040404 100%);
        font-family: Consolas, monospace;
      }
      .initial-boot-inner { display: grid; justify-items: center; gap: 18px; }
      .initial-boot-brand { display: flex; align-items: center; gap: 14px; }
      .initial-boot-brand img { width: 48px; height: 48px; image-rendering: pixelated; }
      .initial-boot-brand strong { font-size: 18px; }
      .initial-boot-bar { width: 220px; height: 6px; overflow: hidden; border: 1px solid #434343; background: #080808; }
      .initial-boot-bar span { display: block; width: 42%; height: 100%; background: #d9ad24; }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="initial-boot-splash" aria-label="Shockless Engine is starting">
        <div class="initial-boot-inner">
          <div class="initial-boot-brand">
            <img src="./img/headicon.png" alt="" />
            <strong>Shockless Engine</strong>
          </div>
          <div class="initial-boot-bar"><span></span></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/renderer/main.tsx"></script>
  </body>
</html>
